<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title></title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
	<style>
		body, svg, text {
			font-family: "Montserrat", sans-serif;
		}
	</style>
	<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
	<script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.js"></script>
</head>
<body>
	<svg id="chart" width="900" height="520"></svg>
	<script>
		const data = [
			{ label: "BL use only", value: 2.26, ci: [0.88, 5.78], color: "#3b82f6", hoverColor: "#1e3a8a" },
			{ label: "Use between BL and 12M", value: 3.95, ci: [1.64, 9.47], color: "#10b981", hoverColor: "#065f46" },
			{ label: "Persistent use", value: 7.11, ci: [4.53, 11.17], color: "#f97316", hoverColor: "#9a3412" }
		];

		const svg = d3.select("#chart");
		const width = +svg.attr("width");
		const height = +svg.attr("height");
		const margin = { top: 50, right: 80, bottom: 70, left: 260 };
		const innerWidth = width - margin.left - margin.right;
		const innerHeight = height - margin.top - margin.bottom;
		const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);
		const rc = rough.svg(svg.node());

		const x = d3.scaleLinear()
			.domain([0, 12])
			.range([0, innerWidth]);

		const y = d3.scaleBand()
			.domain(data.map(d => d.label))
			.range([0, innerHeight])
			.padding(0.28);

		g.append("g").call(d3.axisLeft(y))
			.selectAll(".tick text")
			.style("font-size", "15px");
		g.append("g")
			.attr("transform", `translate(0,${innerHeight})`)
			.call(d3.axisBottom(x).ticks(8));

		// Vertical line at x=1 (null)
		g.append("line")
			.attr("x1", x(1))
			.attr("x2", x(1))
			.attr("y1", 0)
			.attr("y2", innerHeight)
			.attr("stroke", "#555")
			.attr("stroke-width", 1.5)
			.attr("stroke-dasharray", "5,4");

		g.append("text")
			.attr("x", innerWidth / 2)
			.attr("y", innerHeight + 42)
			.attr("text-anchor", "middle")
			.attr("font-size", 20)
			.attr("font-weight", 600)
			.text("Adjusted Odds Ratio (aOR)");

		g.append("text")
			.attr("x", innerWidth)
			.attr("y", innerHeight + 70)
			.attr("text-anchor", "end")
			.attr("font-size", 20).attr("fill", "#888")
			.text("From Grov et al. (2020)");

		g.append("text")
			.attr("x", innerWidth / 2)
			.attr("y", -18)
			.attr("text-anchor", "middle")
			.attr("font-size", 20)
			.attr("font-weight", 700)
			.text("Methamphetamine use and Incidence HIV Diagnosis");

		const diamondSize = 12; // half-width and half-height of diamond

		data.forEach(d => {
			const cx = x(d.value);
			const cy = y(d.label) + y.bandwidth() / 2;
			const ciLeft = x(d.ci[0]);
			const ciRight = x(d.ci[1]);

			const pointGroup = g.append("g").style("cursor", "pointer");

			// CI line
			const ciLine = pointGroup.append("line")
				.attr("x1", ciLeft)
				.attr("x2", ciRight)
				.attr("y1", cy)
				.attr("y2", cy)
				.attr("stroke", d.color)
				.attr("stroke-width", 2.5);

			// CI whisker left
			pointGroup.append("line")
				.attr("x1", ciLeft).attr("x2", ciLeft)
				.attr("y1", cy - 7).attr("y2", cy + 7)
				.attr("stroke", d.color).attr("stroke-width", 2.5);

			// CI whisker right
			pointGroup.append("line")
				.attr("x1", ciRight).attr("x2", ciRight)
				.attr("y1", cy - 7).attr("y2", cy + 7)
				.attr("stroke", d.color).attr("stroke-width", 2.5);

			// Rough diamond (square rotated 45°) as forest plot point
			const diamondPath = `M ${cx} ${cy - diamondSize} L ${cx + diamondSize} ${cy} L ${cx} ${cy + diamondSize} L ${cx - diamondSize} ${cy} Z`;
			const roughNode = rc.path(diamondPath, {
				fill: d.color,
				fillStyle: "zigzag",
				stroke: d.color,
				roughness: 1.5,
				bowing: 1.2
			});
			pointGroup.node().appendChild(roughNode);

			// Solid colored diamond overlay for hover
			const diamond = pointGroup.append("polygon")
				.attr("points", `${cx},${cy - diamondSize} ${cx + diamondSize},${cy} ${cx},${cy + diamondSize} ${cx - diamondSize},${cy}`)
				.attr("fill", d.color)
				.attr("opacity", 0.35);

			// Value label
			pointGroup.append("text")
				.attr("x", ciRight + 8)
				.attr("y", cy + 5)
				.attr("text-anchor", "start")
				.attr("font-size", 16)
				.attr("font-weight", 600)
				.attr("fill", d.color)
				.text(`${d.value.toFixed(2)} (${d.ci[0].toFixed(2)}–${d.ci[1].toFixed(2)})`);

			pointGroup
				.on("mouseenter", () => {
					diamond.attr("fill", d.hoverColor).attr("opacity", 0.6);
					ciLine.attr("stroke", d.hoverColor);
				})
				.on("mouseleave", () => {
					diamond.attr("fill", d.color).attr("opacity", 0.35);
					ciLine.attr("stroke", d.color);
				});
		});
	</script>
</body>
</html>
