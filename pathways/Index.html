<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
	<meta http-equiv="Pragma" content="no-cache" />
	<meta http-equiv="Expires" content="0" />
	<title>Risk Ratio Beeswarm Plot</title>
	<script src="https://d3js.org/d3.v7.min.js"></script>
	<script src="https://unpkg.com/roughjs@4.5.2/bundled/rough.js"></script>
	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			font-size: 125%;
			background: transparent;
			color: #222;
		}
		.container {
			max-width: 1100px;
			margin: 24px auto;
			padding: 0 16px;
		}
		h1 {
			margin: 0 0 10px;
			font-size: 25px;
			font-weight: 600;
			text-align: center;
		}
		p {
			margin: 0 0 16px;
			color: #555;
			font-size: 17.5px;
		}
		svg {
			width: 100%;
			height: auto;
			background: transparent;
			border: 1px solid #e9e9e9;
			border-radius: 8px;
		}
		.axis path,
		.axis line {
			stroke: #bbb;
		}
		.axis text {
			fill: #444;
			font-size: 15px;
		}
		.grid line {
			stroke: #eee;
		}
		.grid path {
			stroke: none;
		}
		.median-line {
			pointer-events: none;
		}
		.swarm-group {
			cursor: pointer;
		}
		.swarm-dot {
			transition: fill-opacity 0.2s ease, stroke-width 0.2s ease, r 0.2s ease;
		}
		.swarm-group:hover .swarm-dot {
			fill-opacity: 0.95 !important;
			stroke-width: 1.4 !important;
			r: 5.2 !important;
		}
		.median-label {
			pointer-events: none;
			font-size: 20px;
			font-weight: 600;
			text-anchor: middle;
			fill: #222;
			opacity: 0;
			transition: opacity 0.2s ease;
			dominant-baseline: auto;
		}
		.median-label-bg {
			pointer-events: none;
			fill: #fff;
			stroke: #d9d9d9;
			stroke-width: 1;
			opacity: 0;
			transition: opacity 0.2s ease;
		}
		.percentage-label {
			pointer-events: none;
			font-size: 30px;
			font-weight: 600;
			text-anchor: middle;
			fill: #222;
			opacity: 0;
			transition: opacity 0.2s ease;
			dominant-baseline: auto;
		}
		.swarm-group:hover .median-label {
			opacity: 1;
		}
		.swarm-group:hover .median-label-bg {
			opacity: 1;
		}
		.swarm-group:hover .percentage-label {
			opacity: 1;
		}
	</style>
</head>
<body>
	<div class="container">
		<svg id="chart" viewBox="0 0 1050 560" role="img" aria-label="Risk ratio beeswarm distributions by condition (100 sampled observations per condition)"></svg>
	</div>

	<script>
		// Load CSV file and process data
		async function loadAndPlotData() {
			const cleanCell = value => value.trim().replace(/^['"]|['"]$/g, "");
			const formatCondition = value => cleanCell(value).replace(/\./g, " ");

			// Load CSV file with cache-busting so updates are reflected immediately.
			// Optional: pass ?csv=your-file.csv in the URL to use a new file in this folder.
			const csvFromQuery = new URLSearchParams(window.location.search).get("csv");
			const csvCandidates = csvFromQuery
				? [csvFromQuery]
				: ["data.csv", "new_data.csv", "updated_data.csv"];

			let csv = "";
			let loadedFile = "";
			let maxHeaderColumns = 0;
			for (const fileName of csvCandidates) {
				const url = `${fileName}${fileName.includes("?") ? "&" : "?"}v=${Date.now()}`;
				try {
					const response = await fetch(url, {
						cache: "no-store",
						headers: {
							"Cache-Control": "no-cache, no-store, must-revalidate",
							"Pragma": "no-cache",
							"Expires": "0"
						}
					});
					if (!response.ok) continue;
					const candidateCsv = await response.text();
					if (!candidateCsv.trim()) continue;

					const firstNonEmptyLine = candidateCsv
						.replace(/^\uFEFF/, "")
						.split(/\r?\n/)
						.map(line => line.trim())
						.find(line => line.length > 0) || "";
					const headerColumns = firstNonEmptyLine ? firstNonEmptyLine.split(',').length : 0;

					if (headerColumns > maxHeaderColumns) {
						maxHeaderColumns = headerColumns;
						csv = candidateCsv;
						loadedFile = fileName;
					}
				} catch (_) {
					// Try next candidate
				}
			}

			if (!csv.trim()) {
				throw new Error("No CSV file could be loaded. Use ?csv=your-file.csv if needed.");
			}
			console.log(`Loaded CSV: ${loadedFile}`);
			
			// Parse CSV: first non-empty row is header with condition names, subsequent rows are study data
			const lines = csv
				.replace(/^\uFEFF/, "")
				.split(/\r?\n/)
				.map(line => line.trim())
				.filter(line => line.length > 0);
			const conditions = lines[0].split(',').map(formatCondition);
			
			// Transform CSV rows into flat data structure
			const data = [];
			for (let rowIdx = 1; rowIdx < lines.length; rowIdx++) {
				const values = lines[rowIdx].split(',').map(s => cleanCell(s));
				for (let colIdx = 0; colIdx < conditions.length; colIdx++) {
					const riskRatio = parseFloat(values[colIdx]);
					if (!isNaN(riskRatio)) {
						data.push({
							condition: conditions[colIdx],
							studyId: values[0],
							riskRatio: riskRatio
						});
					}
				}
			}
			
			plotChart(data, conditions);
		}

		function plotChart(data, conditions) {

		const plottedConditions = conditions.filter(c => {
			const normalized = c.trim().toLowerCase();
			return normalized !== "zero" && normalized !== "0";
		});

		const svg = d3.select("#chart");
		const width = 1050;
		const height = 560;
		const margin = { top: 20, right: 30, bottom: 80, left: 100 };
		const innerWidth = width - margin.left - margin.right;
		const innerHeight = height - margin.top - margin.bottom;

		const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);
		const roughSvg = rough.svg(svg.node());

		const y = d3.scaleLinear()
			.domain([0.5, 3])
			.nice()
			.range([innerHeight, 0]);

		const x = d3.scaleBand()
			.domain(plottedConditions)
			.range([18, innerWidth])
			.paddingInner(0.45);

		const xCenter = d => x(d.condition) + x.bandwidth() / 2;

		const color = d3.scaleOrdinal()
			.domain(plottedConditions)
			.range(["#3b82f6", "#14b8a6", "#22c55e", "#f59e0b", "#ef4444", "#8b5cf6", "#64748b"]);

		g.append("g")
			.attr("class", "grid")
			.call(
				d3.axisLeft(y)
					.tickSize(-innerWidth)
					.tickFormat("")
			);

		g.append("g")
			.attr("class", "axis")
			.call(d3.axisLeft(y));

		const xAxisGroup = g.append("g")
			.attr("class", "axis")
			.attr("transform", `translate(0,${innerHeight})`)
			.call(d3.axisBottom(x).tickSizeOuter(0));

		g.append("text")
			.attr("transform", "rotate(-90)")
			.attr("x", -innerHeight / 2)
			.attr("y", -65)
			.attr("text-anchor", "middle")
			.style("font-size", "16.25px")
			.text("Risk Ratio (HIV Incidence per 100 PY)");

		// Beeswarm layer
		const swarmLayer = g.append("g").attr("class", "swarm-layer");

		const normalizeConditionKey = value =>
			value.toLowerCase().replace(/[^a-z0-9]/g, "");

		const allDifferenceCondition = plottedConditions.find(c => {
			const key = normalizeConditionKey(c);
			return key === "alldifference" || key.includes("alldifference");
		});
		const rrAllDifferenceValues = allDifferenceCondition
			? data
				.filter(d => d.condition === allDifferenceCondition)
				.map(d => d.riskRatio)
				.sort(d3.ascending)
			: [];
		const rrAllDifference = rrAllDifferenceValues.length
			? d3.quantile(rrAllDifferenceValues, 0.5)
			: null;

		const sampleSizePerCondition = 100;

		plottedConditions.forEach(condition => {
			const swarmGroup = swarmLayer.append("g")
				.attr("class", "swarm-group")
				.on("mouseenter", () => {
					xAxisGroup.selectAll(".tick text")
						.style("font-weight", d => (d === condition ? "700" : null));
				})
				.on("mouseleave", () => {
					xAxisGroup.selectAll(".tick text")
						.style("font-weight", null);
				});

			const values = data
				.filter(d => d.condition === condition)
				.map(d => d.riskRatio)
				.sort(d3.ascending);

			if (!values.length) return;

			const sampledValues = values.length >= sampleSizePerCondition
				? d3.shuffle(values.slice()).slice(0, sampleSizePerCondition)
				: d3.range(sampleSizePerCondition).map(() => values[Math.floor(Math.random() * values.length)]);

			const cx = xCenter({ condition });
			const q1 = d3.quantile(values, 0.25);
			const median = d3.quantile(values, 0.5);
			const q3 = d3.quantile(values, 0.75);

			const nodes = sampledValues.map(v => ({
				riskRatio: v,
				x: cx,
				y: y(v)
			}));

			const dotRadius = 4.2;
			d3.forceSimulation(nodes)
				.force("x", d3.forceX(cx).strength(0.08))
				.force("y", d3.forceY(d => y(d.riskRatio)).strength(1))
				.force("collide", d3.forceCollide(dotRadius + 0.4))
				.stop()
				.tick(220);

			swarmGroup.selectAll("circle")
				.data(nodes)
				.enter()
				.append("circle")
				.attr("class", "swarm-dot")
				.attr("cx", d => d.x)
				.attr("cy", d => d.y)
				.attr("r", dotRadius)
				.attr("fill", color(condition))
				.attr("fill-opacity", 0.72)
				.attr("stroke", d3.color(color(condition)).darker(1).formatHex())
				.attr("stroke-width", 0.8);

			// Median line
			swarmGroup.append("line")
				.attr("x1", cx - x.bandwidth() * 0.26)
				.attr("x2", cx + x.bandwidth() * 0.26)
				.attr("y1", y(median))
				.attr("y2", y(median))
				.attr("stroke", "#fff")
				.attr("stroke-width", 2)
				.attr("class", "median-line");

			// Median label (shown on hover) with white background for readability
			const medianLabelY = Math.min(y(q1) + 24, innerHeight - 8);
			swarmGroup.append("rect")
				.attr("class", "median-label-bg")
				.attr("x", cx - 48)
				.attr("y", medianLabelY - 22)
				.attr("width", 96)
				.attr("height", 28)
				.attr("rx", 4)
				.attr("ry", 4);

			swarmGroup.append("text")
				.attr("class", "median-label")
				.attr("x", cx)
				.attr("y", medianLabelY)
				.text(`RR: ${d3.format(".2f")(median)}`);

			const isAllDifference =
				allDifferenceCondition && normalizeConditionKey(condition) === normalizeConditionKey(allDifferenceCondition);
			const denominator = rrAllDifference == null ? null : (1 - rrAllDifference);
			const percentageDecrease =
				isAllDifference || denominator == null || denominator === 0
					? null
					: (1 - ((1 - median) / (1 - rrAllDifference))) * 100;

			swarmGroup.append("text")
				.attr("class", "percentage-label")
				.attr("x", innerWidth / 2)
				.attr("y", 34)
				.text(
					isAllDifference
						? ""
						: (percentageDecrease == null || !isFinite(percentageDecrease)
							? "Percentage decrease: N/A"
						: `Percentage decrease: ${d3.format(".1f")(percentageDecrease)}%`
						)
				);
		});

		// Reference line at RR = 1
		const refY = y(1);
		const refLine = roughSvg.line(
			margin.left,
			margin.top + refY,
			margin.left + innerWidth,
			margin.top + refY,
			{ stroke: "#cc4c4c", strokeWidth: 1.5, roughness: 0.8, bowing: 0.5, strokeLineDash: [2, 6] }
		);
		svg.node().appendChild(refLine);
		}

		loadAndPlotData().catch(err => {
			console.error("Failed to load or plot data:", err);
		});
	</script>
</body>
</html>
