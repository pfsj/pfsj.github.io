<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rough.js + D3.js Network Epidemic Simulation</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/roughjs@4.5.2/bundled/rough.js"></script>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            min-height: 100vh;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; 
            pointer-events: none; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="network-canvas" width="600" height="600"></canvas>
    </div>

<script>
const width = 600;
const height = 600;

// --- Simulation Parameters ---
const numNodes = 30;                 
const INFECTION_PROB = 0.006;        
const SPREAD_SPEED = 0.012;          
const MAX_DISTANCE = 110;             
const NODE_RADIUS = 20;   

// --- Pacing Controls for Slower Shifts ---
const STRUCTURE_TICK_RATE = 20;      
const SHUFFLE_COUNT = 1;             

const canvas = document.getElementById('network-canvas');
const ctx = canvas.getContext('2d');
const rc = rough.canvas(canvas);

let nodes = [];
let links = [];
let simulation;
let isResetting = false;
let animationFrameId;
let frameCounter = 0;

// --- Rough.js Cache to prevent shaking ---
let nodeCache = {};

function getNodeDegree(nodeId) {
    return links.filter(l => {
        const sId = typeof l.source === 'object' ? l.source.id : l.source;
        const tId = typeof l.target === 'object' ? l.target.id : l.target;
        return sId === nodeId || tId === nodeId;
    }).length;
}

function init() {
    isResetting = false;
    frameCounter = 0;
    nodeCache = {}; // Reset cache

    nodes = Array.from({ length: numNodes }, (_, i) => {
        const isInfectedSeed = (i === 3 || i === 18); 
        const angle = (i / numNodes) * Math.PI * 2;
        const radius = 110 + (Math.random() - 0.5) * 20; 
        return {
            id: i,
            x: width / 2 + Math.cos(angle) * radius,
            y: height / 2 + Math.sin(angle) * radius,
            status: isInfectedSeed ? 'infected' : 'susceptible',
            infectionProgress: isInfectedSeed ? 1.0 : 0.0 
        };
    });

    links = [];
    let initialAttempts = 0;
    while (links.length < 15 && initialAttempts < 300) {
        const i = Math.floor(Math.random() * numNodes);
        const j = Math.floor(Math.random() * numNodes);
        if (i !== j) {
            const alreadyLinked = links.some(l => (l.source === i && l.target === j) || (l.source === j && l.target === i));
            if (!alreadyLinked && getNodeDegree(i) < 2 && getNodeDegree(j) < 2) {
                links.push({ source: i, target: j });
            }
        }
        initialAttempts++;
    }

    if (simulation) simulation.stop();
    
    simulation = d3.forceSimulation(nodes)
        .velocityDecay(0.35) 
        .force("link", d3.forceLink(links).id(d => d.id).distance(25).strength(0.40)) 
        .force("charge", d3.forceManyBody().strength(-40))                           
        .force("x", d3.forceX(width / 2).strength(0.03)) 
        .force("y", d3.forceY(height / 2).strength(0.03))
        .force("collision", d3.forceCollide().radius(NODE_RADIUS + 8));               
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    loop();
}

function loop() {
    updateNetwork();
    draw();
    animationFrameId = requestAnimationFrame(loop);
}

function updateNetwork() {
    simulation.alpha(0.08); 
    frameCounter++;

    nodes.forEach(node => {
        if (node.x < NODE_RADIUS) { node.x = NODE_RADIUS; if(node.vx) node.vx *= -0.1; }
        else if (node.x > width - NODE_RADIUS) { node.x = width - NODE_RADIUS; if(node.vx) node.vx *= -0.1; }

        if (node.y < NODE_RADIUS) { node.y = NODE_RADIUS; if(node.vy) node.vy *= -0.1; }
        else if (node.y > height - NODE_RADIUS) { node.y = height - NODE_RADIUS; if(node.vy) node.vy *= -0.1; }
    });

    if (frameCounter % STRUCTURE_TICK_RATE === 0 && links.length > 5) {
        for (let k = 0; k < SHUFFLE_COUNT; k++) {
            const removeIndex = Math.floor(Math.random() * links.length);
            links.splice(removeIndex, 1);

            let linkForged = false;
            let searchAttempts = 0;

            while (!linkForged && searchAttempts < 80) {
                const i = Math.floor(Math.random() * numNodes);
                const j = Math.floor(Math.random() * numNodes);
                
                if (i !== j) {
                    const u = nodes[i];
                    const v = nodes[j];
                    const dist = Math.hypot(u.x - v.x, u.y - v.y);

                    if (dist < MAX_DISTANCE) {
                        const alreadyLinked = links.some(l => {
                            const sId = typeof l.source === 'object' ? l.source.id : l.source;
                            const tId = typeof l.target === 'object' ? l.target.id : l.target;
                            return (sId === u.id && tId === v.id) || (sId === v.id && tId === u.id);
                        });

                        if (!alreadyLinked && getNodeDegree(u.id) < 2 && getNodeDegree(v.id) < 2) {
                            links.push({ source: u.id, target: v.id });
                            linkForged = true;
                        }
                    }
                }
                searchAttempts++;
            }
        }
        simulation.force("link").links(links);
    }

    nodes.forEach(node => {
        if (node.status === 'infected' && node.infectionProgress < 1.0) {
            node.infectionProgress = Math.min(1.0, node.infectionProgress + SPREAD_SPEED);
        }
    });

    links.forEach(link => {
        const s = link.source;
        const t = link.target;
        
        if (typeof s === 'object' && typeof t === 'object') {
            if (s.status === 'infected' && t.status === 'susceptible' && Math.random() < INFECTION_PROB) {
                t.status = 'infected';
            }
            if (t.status === 'infected' && s.status === 'susceptible' && Math.random() < INFECTION_PROB) {
                s.status = 'infected';
            }
        }
    });

    const infectedCount = nodes.filter(n => n.status === 'infected').length;
    if (infectedCount >= (numNodes / 2) && !isResetting) {
        isResetting = true;
        setTimeout(() => {
            init();
        }, 2500); 
    }
}

// Helper to generate a pre-compiled rough shape and cache it
function getCachedNodeDrawable(id, type, radius) {
    const key = `${id}-${type}-${radius.toFixed(1)}`;
    if (!nodeCache[key]) {
        const generator = rc.generator;
        if (type === 'susceptible') {
            nodeCache[key] = generator.circle(0, 0, NODE_RADIUS, {
                stroke: '#4682b4',
                strokeWidth: 1,
                fill: '#70a1ff',
                fillStyle: 'hachure', 
                fillWeight: 1,        
                hachureGap: 4,        
                roughness: 0.8
            });
        } else if (type === 'infected-ring') {
            // Draws just a red outer perimeter ring with no fill lines inside
            nodeCache[key] = generator.circle(0, 0, NODE_RADIUS, {
                stroke: '#b23b3b',
                strokeWidth: 1,
                roughness: 0.8
            });
        } else if (type === 'infected-fill') {
            // Draws the inner growing sketchy lines (borderless or small border matching fill)
            nodeCache[key] = generator.circle(0, 0, radius, {
                stroke: '#b23b3b',
                strokeWidth: 0.5,
                fill: '#d9534f',
                fillStyle: 'hachure',
                fillWeight: 1,
                hachureGap: 3,        
                roughness: 0.6
            });
        }
    }
    return nodeCache[key];
}

function draw() {
    ctx.clearRect(0, 0, width, height);

    // Draw Edges
    links.forEach(link => {
        if (typeof link.source === 'object' && typeof link.target === 'object') {
            rc.line(link.source.x, link.source.y, link.target.x, link.target.y, {
                stroke: '#d8d8d8',
                strokeWidth: 1.2, 
                roughness: 0.4, 
                bowing: 0.2
            });
        }
    });

    // Draw Nodes
    nodes.forEach(node => {
        ctx.save();
        ctx.translate(node.x, node.y);
        
        if (node.infectionProgress > 0) {
            // 1. Draw the base ring, now completely RED instead of blue
            const redOuterRing = getCachedNodeDrawable(node.id, 'infected-ring', NODE_RADIUS);
            rc.draw(redOuterRing);

            // 2. Draw the growing red sketchy fill inside
            const currentRedRadius = node.infectionProgress * NODE_RADIUS;
            const infectedFill = getCachedNodeDrawable(node.id, 'infected-fill', currentRedRadius);
            rc.draw(infectedFill);
        } else {
            // Node is healthy: draw full sketchy blue filled circle with blue border
            const baseShape = getCachedNodeDrawable(node.id, 'susceptible', NODE_RADIUS);
            rc.draw(baseShape);
        }
        
        ctx.restore();
    });
}

init();
</script>
</body>
</html>
