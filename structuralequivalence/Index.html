<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D3: Structural Equivalence vs Cohesion</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; background: #f7f8fc; }
    h2 { margin: 0 0 6px; }
    p { margin: 0 0 14px; color: #475569; }
    .panel-title { font-size: 15px; font-weight: 700; fill: #0f172a; }
    .panel-note { font-size: 12px; fill: #64748b; }
    .link { stroke: #a5b4c9; stroke-width: 2; stroke-opacity: 0.85; }
    .node { stroke: #334155; stroke-width: 1.1; }
    .focusA { fill: #5b8def; }
    .focusB { fill: #f07c82; }
    .other { fill: #b8c7e6; }
    .label { font-size: 12px; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
  </style>
</head>
<body>
  <h2>Two Network Concepts (5 Nodes Total Each)</h2>
  <p>Node A (blue) and Node B (red) are emphasized in both figures.</p>
  <svg id="chart" width="1080" height="430"></svg>

  <script>
    const svg = d3.select("#chart");

    function drawNetwork(cfg) {
      const panelWidth = 480;
      const panelHeight = 390;
      const topOffset = 54;

      const g = svg.append("g").attr("transform", `translate(${cfg.x}, 10)`);

      g.append("rect")
        .attr("x", 0)
        .attr("y", 0)
        .attr("width", panelWidth)
        .attr("height", panelHeight)
        .attr("rx", 14)
        .attr("fill", "#ffffff")
        .attr("stroke", "#e2e8f0");

      g.append("text")
        .attr("class", "panel-title")
        .attr("x", 240)
        .attr("y", 20)
        .attr("text-anchor", "middle")
        .text(cfg.title);

      g.append("text")
        .attr("class", "panel-note")
        .attr("x", 240)
        .attr("y", 38)
        .attr("text-anchor", "middle")
        .text(cfg.note);

      const localNodes = cfg.nodes.map(d => ({
        ...d,
        x: 70 + Math.random() * (panelWidth - 140),
        y: topOffset + 30 + Math.random() * (panelHeight - topOffset - 80)
      }));

      const localLinks = cfg.links.map(d => ({ ...d }));

      const link = g.selectAll("line")
        .data(localLinks)
        .enter()
        .append("line")
        .attr("class", "link")
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);

      const nodes = g.selectAll("g.node")
        .data(localNodes)
        .enter()
        .append("g")
        .attr("transform", d => `translate(${d.x},${d.y})`)
        .call(d3.drag()
          .on("start", (event, d) => {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
          })
          .on("drag", (event, d) => {
            d.fx = event.x;
            d.fy = event.y;
          })
          .on("end", (event, d) => {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
          }));

      nodes.append("circle")
        .attr("class", d => `node ${d.type}`)
        .attr("r", 22);

      nodes.append("text")
        .attr("class", "label")
        .text(d => `Node ${d.id}`);

      const simulation = d3.forceSimulation(localNodes)
        .force("link", d3.forceLink(localLinks).id(d => d.id).distance(110).strength(0.55))
        .force("charge", d3.forceManyBody().strength(-260))
        .force("collision", d3.forceCollide(34))
        .force("x", d3.forceX(panelWidth / 2).strength(0.02))
        .force("y", d3.forceY((panelHeight + topOffset) / 2).strength(0.02))
        .alpha(0.9)
        .alphaDecay(0.015)
        .on("tick", () => {
          localNodes.forEach(d => {
            d.x = Math.max(30, Math.min(panelWidth - 30, d.x));
            d.y = Math.max(topOffset + 26, Math.min(panelHeight - 26, d.y));
          });

          link
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

          nodes.attr("transform", d => `translate(${d.x},${d.y})`);
        });

      setInterval(() => {
        simulation.alphaTarget(0.12).restart();
        setTimeout(() => simulation.alphaTarget(0), 280);
      }, 2200);
    }

    const nodes = [
      { id: "A", type: "focusA" },
      { id: "B", type: "focusB" },
      { id: "C", type: "other" },
      { id: "D", type: "other" },
      { id: "E", type: "other" }
    ];

    // Structural Equivalence: A and B share similar ties to C and D.
    const structuralLinks = [
      { source: "A", target: "C" },
      { source: "A", target: "E" },
      { source: "B", target: "C" },
      { source: "B", target: "E" },
      { source: "C", target: "E" },
      { source: "D", target: "E" }
    ];

    // Cohesion: A and B directly connected and part of a denser local cluster.
    const cohesionLinks = [
      { source: "A", target: "B" },
      { source: "A", target: "C" },
      { source: "A", target: "D" },
      { source: "B", target: "E" },
      { source: "C", target: "D" }
    ];

    drawNetwork({
      x: 10,
      title: "Structural Equivalence",
      note: "A and B are not tied directly but have matching tie patterns.",
      nodes,
      links: structuralLinks
    });

    drawNetwork({
      x: 550,
      title: "Cohesion",
      note: "A and B are directly connected within a cohesive cluster.",
      nodes,
      links: cohesionLinks
    });
  </script>
</body>
</html>
